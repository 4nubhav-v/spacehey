<style>

  :root {
    --bgColors: #041a00;
    --fg1Colors: #61bc86;
    --fg2Colors: #8eeab8;
    --headingColor1: hsl(0, 0, 0, 0);

  }
  body:before {
    content: "";
    height: 100vh;
    width: 100vw;
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 100;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
  }
  @keyframes fade-in-bottom {
    0% {
      transform: translateY(50px);
      opacity: 0;
    }
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  body {

    animation: fade-in-bottom 0.6s cubic-bezier(0.39, 0.575, 0.565, 1) both;
  }

  body::after {
    content: " ";
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    z-index: 2;
    background-size:
      100% 2px,
      3px 100%;
    pointer-events: none;

      transition: filter 400ms ease-in-out;

      transition: filter 400ms ease-in-out;

    0%,

    21%,
    23%,
    25%,
    54%,
    56%,
    100% {
      text-shadow:
        -0.2rem -0.2rem 1rem var(--headingColor),
        0.2rem 0.2rem 1rem var(--headingColor),
        0 0 2rem var(--headingColor),
        0 0 4rem var(--headingColor),
        0 0 6rem var(--headingColor),
        0 0 8rem var(--headingColor),
        0 0 10rem var(--headingColor);
    }

        0 0 6rem var(--fg2Colors),

    }

    20%,
    24%,
    55% {
      text-shadow: none;
      box-shadow: none;
    }
  }

  @keyframes shake {
    0% {
      transform: translate(1px, 1px) rotate(0);
    }

    10% {
      transform: translate(-1px, -2px) rotate(-1deg);
    }

    20% {
      transform: translate(-3px, 0) rotate(1deg);
    }

    30% {
      transform: translate(3px, 2px) rotate(0);
    }

    40% {
      transform: translate(1px, -1px) rotate(1deg);
    }

    50% {
      transform: translate(-1px, 2px) rotate(-1deg);
    }

    60% {
      transform: translate(-3px, 1px) rotate(0);
    }

    70% {
      transform: translate(3px, 1px) rotate(-1deg);
    }

    80% {

    }

    90% {

    }

    100% {

    0% {

    50% {

    }

    100% {
      transform: translate(0, -0px);
    }
  }

  @keyframes rotate {
    from {
      transform: rotate(5deg);
    }
    to {
      transform: rotate(-5deg);
    }
  }
  @keyframes antirotate {
    from {
      transform: rotate(-5deg);
    }
    to {
      transform: rotate(5deg);
    }
